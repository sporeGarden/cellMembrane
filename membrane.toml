# cellMembrane reference configuration
# Wave 120: sole VPS + identity-based service discovery + config generation
# golgi (sole VPS): Forgejo, WG hub, relay, depot, NUCLEUS 18 svc, sovereign CI
# WireGuard mesh: 4-node (golgi .1, sporeGate .2, eastGate .5, flockGate .6)
# pepti decommissioned (Wave 120) — build role absorbed by sporeGate sovereign CI
# golgiBody-ext consolidated into golgi (Wave 120)

[membrane]
name = "membrane-relay"
domain = "membrane.primals.eco"
composition = "nucleus"
topology = "diderm"
transport = "uds_only"

[membrane.identity]
family_id = "membrane-alpha"
gate_id = "nyc-01"

[membrane.provider]
type = "digitalocean"
region = "nyc1"
size = "s-1vcpu-2gb"

# Sole VPS — consolidated golgi (inner + outer membrane functions)
[membrane.layers.inner]
host = "golgi"
ssh_alias = "golgi"
ip = "157.230.3.183"
size = "s-1vcpu-2gb"
services = ["forgejo", "nucleus-primals", "knot-dns", "btsp-auth", "caddy-tls", "turn-relay", "rustdesk", "wan-depot"]
bond_types = ["covalent", "metallic", "ionic"]

# Peptidoglycan layer (composition concept — not a physical host)
# pepti node decommissioned Wave 120; build role → sporeGate sovereign CI
# Retained as K-Derm layer reference (see MEMBRANE_COMPOSITION_MODEL.md)
# [membrane.layers.peptidoglycan]  # DECOMMISSIONED

[membrane.channels.signal]
enabled = true
primal = "knot-dns"
port = 53
dnssec = true

[membrane.channels.relay]
enabled = true
port = 3478
primal = "songbird"

[membrane.channels.surface]
enabled = true
port = 443
primal = "caddy"
tls_domain = "membrane.primals.eco"
acme_email = "ops@primals.eco"

[membrane.channels.surface.lab]
enabled = true
domain = "lab.primals.eco"
cache_root = "/var/cache/membrane/lab"
static_content = true
interactive_proxy = "gate"

[membrane.channels.surface.git]
enabled = true
domain = "git.primals.eco"
role = "golgiBody"
backend = "forgejo"
backend_port = 3000
ssh_port = 2222

[membrane.credentials]
model = "age"

[membrane.telemetry]
enabled = true
shadow_mode = "permanent"
cutover_gate_days = 7
skunkbat_correlation = true

[membrane.paths]
install_base = "/opt/membrane"
socket_base = "/run/membrane"
credential_base = "/opt/membrane"

[membrane.hardening]
fail2ban = true
unattended_upgrades = true
remove_mail_agent = true
remove_provider_agent = true

[transport.ribocipher]
signal_tier = "clear"
unsignalled_policy = "error"
mito_key_source = "family_seed"
