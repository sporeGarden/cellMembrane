# cellMembrane reference configuration
# This describes the live membrane-relay VPS at membrane.primals.eco
# Composition: Nucleus (Wave 59) — full 13-primal NUCLEUS runtime
# K-Derm: Diderm envelope — gate plasma membrane + VPS periplasm/outer membrane
# Deploy: deploy_membrane.sh deploy root@$VPS --composition nucleus --uds-only

[membrane]
name = "membrane-relay"
domain = "membrane.primals.eco"
composition = "nucleus"
topology = "diderm"
transport = "uds_only"

[membrane.identity]
family_id = "membrane-alpha"
gate_id = "nyc-01"

[membrane.provider]
type = "digitalocean"
region = "nyc1"
size = "s-1vcpu-2gb"
image = "debian-12-x64"
tags = ["membrane", "production"]

[membrane.channels.signal]
enabled = true
primal = "knot-dns"
port = 53
dnssec = true

[membrane.channels.relay]
enabled = true
port = 3478
primal = "songbird"

[membrane.channels.surface]
enabled = true
port = 443
primal = "caddy"
tls_domain = "membrane.primals.eco"
acme_email = "ops@primals.eco"

[membrane.channels.surface.lab]
enabled = true
domain = "lab.primals.eco"
cache_root = "/var/cache/membrane/lab"
static_content = true
interactive_proxy = "gate"

[membrane.channels.surface.git]
enabled = true
domain = "git.primals.eco"
role = "golgiBody"
backend = "forgejo"
backend_port = 3000
ssh_port = 2222

[membrane.credentials]
model = "age"

[membrane.telemetry]
enabled = true
shadow_mode = "permanent"
cutover_gate_days = 7
skunkbat_correlation = true

[membrane.paths]
install_base = "/opt/membrane"
socket_base = "/run/membrane"
credential_base = "/opt/membrane"

[membrane.hardening]
fail2ban = true
unattended_upgrades = true
remove_mail_agent = true
remove_provider_agent = true
