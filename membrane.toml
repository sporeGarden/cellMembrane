# cellMembrane reference configuration
# Wave 111: 3-tier diesel engine (sandbox/main/canary) with fieldMouse provisioning
# Inner membrane (golgiBody): Forgejo, NUCLEUS 13/13, sovereign services
# Peptidoglycan (peptidoglycan): Build hub, workspace, temporal sync convergence
# Outer membrane (golgiBody-ext): sporePrint hosting, TURN relay, public-facing
# Canary (fieldMouse): Warm standby droplet, previous-good binaries, auto-failover

[membrane]
name = "membrane-relay"
domain = "membrane.primals.eco"
composition = "nucleus"
topology = "diderm"
transport = "uds_only"

[membrane.identity]
family_id = "membrane-alpha"
gate_id = "nyc-01"

[membrane.provider]
type = "digitalocean"
region = "nyc1"
size = "s-1vcpu-2gb"

# Inner membrane — sovereign periplasm
[membrane.layers.inner]
host = "golgiBody"
ssh_alias = "golgi"
ip = "157.230.3.183"
size = "s-1vcpu-2gb"
services = ["forgejo", "nucleus-primals", "knot-dns", "btsp-auth"]
bond_types = ["covalent", "metallic"]

# Peptidoglycan — structural sync layer
[membrane.layers.peptidoglycan]
host = "peptidoglycan"
ip = "157.230.209.218"
size = "s-2vcpu-4gb"
services = ["workspace", "builds", "temporal-sync", "membrane-binary"]
bond_types = ["metallic"]

# Outer membrane — public-facing
[membrane.layers.outer]
host = "golgiBody-ext"
ip = "137.184.197.151"
size = "s-1vcpu-2gb"
services = ["caddy-tls", "sporeprint", "turn-relay", "rustdesk"]
bond_types = ["ionic", "weak"]

[membrane.channels.signal]
enabled = true
primal = "knot-dns"
port = 53
dnssec = true

[membrane.channels.relay]
enabled = true
port = 3478
primal = "songbird"

[membrane.channels.surface]
enabled = true
port = 443
primal = "caddy"
tls_domain = "membrane.primals.eco"
acme_email = "ops@primals.eco"

[membrane.channels.surface.lab]
enabled = true
domain = "lab.primals.eco"
cache_root = "/var/cache/membrane/lab"
static_content = true
interactive_proxy = "gate"

[membrane.channels.surface.git]
enabled = true
domain = "git.primals.eco"
role = "golgiBody"
backend = "forgejo"
backend_port = 3000
ssh_port = 2222

[membrane.credentials]
model = "age"

[membrane.telemetry]
enabled = true
shadow_mode = "permanent"
cutover_gate_days = 7
skunkbat_correlation = true

[membrane.paths]
install_base = "/opt/membrane"
socket_base = "/run/membrane"
credential_base = "/opt/membrane"

[membrane.hardening]
fail2ban = true
unattended_upgrades = true
remove_mail_agent = true
remove_provider_agent = true

[transport.ribocipher]
signal_tier = "clear"
unsignalled_policy = "error"
mito_key_source = "family_seed"
