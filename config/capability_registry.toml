# cellMembrane capability registry
# Machine-readable TOML for ecosystem tooling, deploy graph validation,
# and DOMAIN_OWNER_MAP auto-discovery.
#
# Primal: cellMembrane
# Team: sporeGate
# Role: Sovereign external surface — VPS gate control, relay, webhook cascade

[identity]
primal = "cellMembrane"
composition = "nucleus"
binary = "membrane"

[provided_capabilities]
# Temporal sync — manifest-driven ecosystem cascade
temporal_cascade = { protocol = "cli", description = "Parallel multi-repo sync with divergence resolution" }
temporal_check = { protocol = "cli", description = "Per-repo sync state classification (parity/converge/diverge)" }
temporal_sync = { protocol = "cli", description = "Single-repo sync with push target policy" }

# Plasmid lifecycle — binary harvest, deploy, refresh
plasmid_harvest = { protocol = "cli", description = "Build primal from source, checksum, stage to depot" }
plasmid_refresh = { protocol = "cli", description = "Push binaries to VPS (atomic replace + restart)" }
plasmid_pipeline = { protocol = "cli", description = "Zero-touch harvest → refresh → alive cycle" }
plasmid_trigger = { protocol = "ssh", description = "Remotely trigger VPS pipeline via systemctl" }
plasmid_fetch = { protocol = "cli", description = "Download primal binaries from release/VPS" }
plasmid_status = { protocol = "cli", description = "Report depot freshness and upstream drift" }

# Gate operations
gate_health = { protocol = "ssh", description = "13-primal health.liveness sweep via UDS" }
gate_service = { protocol = "ssh", description = "Service lifecycle (status/restart/logs) via systemctl" }
gate_pull = { protocol = "ssh", description = "Pull ecosystem repos on VPS" }
gate_bootstrap = { protocol = "cli", description = "One-command gate enrollment (profile-driven transport, fetch, verify, mesh, start, health, deployment.toml)" }
gate_bootstrap_mobile = { protocol = "cli", description = "Gate bootstrap with --mobile flag (writes gate-name, enables NM reconnect hook)" }
gate_status = { protocol = "cli", description = "Local gate health probe (depot, mesh, primals via JSON-RPC, freshness)" }
gate_validate = { protocol = "ssh", description = "Composition trust barrier validation — verify gate conforms to declared tier" }
plasmid_build = { protocol = "cli", description = "guideStone-grade single-primal build with ELF validation + provenance" }
gate_profile = { protocol = "cli", description = "Read gate profile from ecosystem_manifest.toml" }
ndk_check = { protocol = "cli", description = "Verify NDK toolchain for aarch64-linux-android cross-compilation" }
harvest_android = { protocol = "cli", description = "plasmid.harvest --target aarch64-linux-android (NDK cross-compile pipeline)" }

# Webhook cascade
webhook_receive = { protocol = "http", description = "Receive push events from Forgejo/GitHub webhooks" }
webhook_test = { protocol = "cli", description = "Test webhook event processing with sample JSON" }
webhook_verify = { protocol = "cli", description = "Verify webhook HMAC signature" }

# Depot integrity
depot_integrity = { protocol = "cli", description = "Generate/verify BLAKE3 checksums for depot binaries" }

# Sandbox + canary lifecycle
plasmid_sandbox = { protocol = "cli", description = "Ephemeral isolated binary validation (UDS probe)" }
plasmid_canary_list = { protocol = "cli", description = "List canary pool state (previous-good binaries)" }
plasmid_canary_health = { protocol = "cli", description = "Health-check all canary instances" }
plasmid_canary_promote = { protocol = "cli", description = "Rollback: canary → production" }

# Rootpulse sovereignty
rootpulse_commit = { protocol = "cli", description = "Commit cascade state to rootPulse ledger" }
rootpulse_verify = { protocol = "cli", description = "Verify sovereignty across mesh gates" }
rootpulse_status = { protocol = "cli", description = "Report rootPulse session state" }

# Preflight + firewall + config generation
gate_preflight = { protocol = "cli", description = "Pre-bootstrap port/service/network checks" }
firewall_generate = { protocol = "cli", description = "Generate nftables/UFW rules from composition" }
wireguard_generate = { protocol = "cli", description = "Generate wg-quick config from manifest mesh peers" }

# Topology + service discovery
topology_resolve = { protocol = "cli", description = "Resolve gate topology (zone, transport, envelope, mesh IP)" }
topology_service = { protocol = "cli", description = "Identity-based service discovery — find gates by role" }
topology_roles = { protocol = "cli", description = "List all role→gate mappings from manifest" }
topology_zones = { protocol = "cli", description = "Cytoplasm zone map with physical hub enrichment" }
topology_mesh = { protocol = "cli", description = "WireGuard mesh peer listing with manifest-authoritative IPs" }
topology_summary = { protocol = "cli", description = "Full TOPOLOGY_MAP.toml summary" }

# Caddy TLS management
caddy_status = { protocol = "ssh", description = "VPS Caddy health + vhosts + TLS status" }
caddy_depot_provision = { protocol = "ssh", description = "Provision /depot/ HTTPS file server" }
caddy_tls_check = { protocol = "ssh", description = "Check TLS certificate status for domain" }
caddy_generate = { protocol = "cli", description = "Generate Caddyfile from manifest roles + topology" }

# Provision (DigitalOcean)
provision_create = { protocol = "api", description = "Create new droplet for gate deployment" }
provision_destroy = { protocol = "api", description = "Destroy provisioned droplet" }
provision_list = { protocol = "api", description = "List membrane-tagged droplets" }
provision_bootstrap = { protocol = "ssh", description = "Remote OS hardening + NUCLEUS install" }

# K-Derm relay chain
relay_mediate = { protocol = "ssh", description = "Inner→outer membrane relay (Forgejo→GitHub sync)" }
relay_ship = { protocol = "ssh", description = "Push repos from inner to outer membrane" }

# Impulse lifecycle
impulse_post = { protocol = "cli", description = "Create and publish impulse signals to wateringHole" }
impulse_ack = { protocol = "cli", description = "Acknowledge received impulse" }
impulse_archive = { protocol = "cli", description = "Archive resolved impulses" }

# Context braids
context_weave = { protocol = "cli", description = "Create/update context braid for gate" }
context_sense = { protocol = "cli", description = "Sense current context state" }

# Freshness tracking
freshness_check = { protocol = "cli", description = "Compare installed binary ages against depot" }
freshness_publish = { protocol = "cli", description = "Publish freshness.toml to ecosystem" }

# Identity resolution
identity_resolve = { protocol = "cli", description = "Resolve gate identity from workspace markers" }

# Cloudflare DNS management
cloudflare_dns = { protocol = "api", description = "CRUD for DNS records via Cloudflare API" }
cloudflare_cache = { protocol = "api", description = "Cache purge operations" }
cloudflare_ssl = { protocol = "api", description = "SSL/TLS settings inspection" }

# Content verification
content_verify = { protocol = "ssh", description = "Verify nestGate content integrity on VPS" }

# Forgejo API
forgejo_repo = { protocol = "api", description = "Repository CRUD and mirroring via Forgejo API" }
forgejo_token = { protocol = "api", description = "API token lifecycle management" }

[consumed_capabilities]
# cellMembrane discovers these at runtime via UDS probes and SSH
ssh_transport = { provider = "system", description = "SSH client for VPS command execution" }
git = { provider = "system", description = "Git CLI for repository operations" }
cargo = { provider = "system", description = "Rust toolchain for binary compilation" }
systemctl = { provider = "vps", description = "Service lifecycle management on deployment target" }
forgejo_api = { provider = "vps", description = "Forgejo REST API for repo/token operations" }
cloudflare_api = { provider = "external", description = "Cloudflare API for DNS/SSL/cache management" }

[discovery]
method = "runtime"
transport = "uds"
socket_path = "/run/membrane/membrane.sock"
health_check = "health.liveness"

[deployment]
install_base = "/opt/membrane"
socket_base = "/run/membrane"
systemd_unit = "membrane.service"
timer_units = ["plasmid-pipeline.timer"]
