# cellMembrane CI — Forgejo Actions dispatch plane
# Runs on push to main and on pull requests.
# Runner: self-hosted (peptidoglycan or gate with Rust toolchain).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Clippy + Format
    runs-on: linux-x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Clippy (pedantic + nursery)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Format check
        run: cargo fmt --all -- --check

  test:
    name: Test Suite
    runs-on: linux-x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test --workspace

  build:
    name: Build (release, musl)
    runs-on: linux-x86_64
    needs: [check, test]
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Ensure musl target
        run: rustup target add x86_64-unknown-linux-musl 2>/dev/null || true

      - name: Build membrane binary
        run: cargo build --release --target x86_64-unknown-linux-musl -p membrane-shadow

      - name: Report binary size
        run: ls -lh target/x86_64-unknown-linux-musl/release/membrane

  deny:
    name: cargo-deny (licenses + bans)
    runs-on: linux-x86_64
    needs: [check, test]
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: cargo deny check
        run: cargo deny check
