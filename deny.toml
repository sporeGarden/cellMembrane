# SPDX-License-Identifier: AGPL-3.0-or-later
# cargo-deny configuration — ecoBin compliance gate
# Run: cargo deny check

[advisories]
unmaintained = "workspace"
unsound = "workspace"
yanked = "warn"
ignore = []

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "AGPL-3.0-or-later",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "CDLA-Permissive-2.0",
]

[[licenses.clarify]]
crate = "unicode-ident"
expression = "(MIT OR Apache-2.0) AND Unicode-3.0"
license-files = [{ path = "LICENSE-UNICODE", hash = 0xb1e81de4 }]

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = [
    # ecoBin: zero application C — no native TLS, no openssl
    { crate = "openssl-sys", use-instead = "rustls" },
    { crate = "openssl", use-instead = "rustls" },
    { crate = "native-tls", use-instead = "rustls" },
    # ring: ecosystem ecoBin standard — pure Rust crypto only (RustCrypto)
    # Known violation: reqwest → rustls → ring (ring v0.17).
    # Remediation: switch reqwest to rustls with aws-lc-rs backend or pure
    # RustCrypto provider once rustls fully supports it. Until then, rustls
    # is listed as an allowed wrapper so CI passes but the ban is tracked.
    { crate = "ring", wrappers = ["rustls", "rustls-webpki"], use-instead = "RustCrypto crates" },
    # No vendor SDKs
    { crate = "aws-sdk-core" },
    { crate = "azure_core" },
]
skip = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
